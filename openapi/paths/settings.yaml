settings:
  get:
    operationId: getSettings
    tags:
      - Settings
    summary: ユーザー設定取得
    description: ログインユーザーのプロフィール・通知・セキュリティ設定を返す。
    responses:
      "200":
        description: ユーザー設定
        content:
          application/json:
            schema:
              $ref: "../components/schemas/settings/SettingsResponse.yaml#/SettingsResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"
  put:
    operationId: updateSettings
    tags:
      - Settings
    summary: ユーザー設定更新
    description: プロフィール・通知・テーマ・言語設定を更新する。
    requestBody:
      $ref: "../components/requestBodies.yaml#/SettingsUpdateBody"
    responses:
      "200":
        description: 更新後ユーザー設定
        content:
          application/json:
            schema:
              $ref: "../components/schemas/settings/SettingsResponse.yaml#/SettingsResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

changePassword:
  put:
    operationId: updatePassword
    tags:
      - Settings
    summary: パスワード変更
    description: 現在のパスワードを検証し、新しいパスワードに変更する。
    requestBody:
      $ref: "../components/requestBodies.yaml#/PasswordChangeBody"
    responses:
      "200":
        description: パスワード変更成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/settings/SettingsResponse.yaml#/SettingsResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

loginHistories:
  get:
    operationId: listLoginHistories
    tags:
      - Settings
    summary: ログイン履歴一覧取得
    description: ログインユーザーのログイン履歴を新しい順に返す。
    parameters:
      - $ref: "../components/parameters.yaml#/QueryPage"
      - $ref: "../components/parameters.yaml#/QueryPerPage"
    responses:
      "200":
        description: ログイン履歴一覧
        content:
          application/json:
            schema:
              type: object
              required:
                - items
                - pageInfo
              properties:
                items:
                  type: array
                  items:
                    $ref: "../components/schemas/settings/LoginHistoryResponse.yaml#/LoginHistoryResponse"
                pageInfo:
                  $ref: "../components/schemas/common/PageInfo.yaml#/PageInfo"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"
