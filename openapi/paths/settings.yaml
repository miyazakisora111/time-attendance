settings:
  get:
    operationId: getSettingsApi
    tags:
      - Settings
    summary: ユーザー設定取得
    responses:
      "200":
        description: ユーザー設定
        content:
          application/json:
            schema:
              $ref: "../components/schemas/settings/SettingsResponse.yaml#/SettingsResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"
  put:
    operationId: updateSettingsApi
    tags:
      - Settings
    summary: ユーザー設定更新
    requestBody:
      $ref: "../components/requestBodies.yaml#/UpdateSettingsBody"
    responses:
      "200":
        description: 更新後ユーザー設定
        content:
          application/json:
            schema:
              $ref: "../components/schemas/settings/SettingsResponse.yaml#/SettingsResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

changePassword:
  put:
    operationId: changePasswordApi
    tags:
      - Settings
    summary: パスワード変更
    requestBody:
      $ref: "../components/requestBodies.yaml#/ChangePasswordBody"
    responses:
      "200":
        description: パスワード変更成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/settings/SettingsResponse.yaml#/SettingsResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

loginHistories:
  get:
    operationId: getLoginHistoriesApi
    tags:
      - Settings
    summary: ログイン履歴一覧取得
    responses:
      "200":
        description: ログイン履歴一覧
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../components/schemas/settings/LoginHistoryResponse.yaml#/LoginHistoryResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"
