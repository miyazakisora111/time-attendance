dashboard:
  get:
    operationId: getDashboardApi
    tags:
      - Dashboard
    summary: ダッシュボード集計取得
    responses:
      "200":
        description: ダッシュボード情報
        content:
          application/json:
            schema:
              $ref: "../components/schemas/dashboard/DashboardResponse.yaml#/DashboardResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

dashboardClock:
  post:
    operationId: dashboardClockApi
    tags:
      - Dashboard
    summary: 打刻アクション（出勤・退勤・休憩開始・休憩終了）
    requestBody:
      $ref: "../components/requestBodies.yaml#/DashboardClockBody"
    responses:
      "200":
        description: 打刻成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/dashboard/DashboardResponse.yaml#/DashboardResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "409":
        $ref: "../components/responses.yaml#/Conflict"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"
