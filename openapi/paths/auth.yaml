login:
  post:
    operationId: login
    tags:
      - Auth
    summary: ログイン
    description: メールアドレスとパスワードで認証し、JWTトークンを返す。
    security: []
    requestBody:
      $ref: "../components/requestBodies.yaml#/LoginBody"
    responses:
      "200":
        description: ログイン成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/auth/LoginResponse.yaml#/LoginResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

logout:
  post:
    operationId: logout
    tags:
      - Auth
    summary: ログアウト
    description: 現在のJWTトークンを無効化する。
    responses:
      "200":
        description: ログアウト成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/auth/LogoutResponse.yaml#/LogoutResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

authMe:
  get:
    operationId: getMe
    tags:
      - Auth
    summary: ログイン中ユーザー情報取得
    description: 現在認証中のユーザー情報を返す。
    responses:
      "200":
        description: 認証済みユーザー情報
        content:
          application/json:
            schema:
              $ref: "../components/schemas/auth/UserResponse.yaml#/UserResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"
