approvalList:
  get:
    operationId: getApprovalListApi
    tags:
      - Approval
    summary: 申請・承認一覧取得
    responses:
      "200":
        description: 申請一覧
        content:
          application/json:
            schema:
              $ref: "../components/schemas/approval/ApprovalListResponse.yaml#/ApprovalListResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

paidLeaveRequests:
  post:
    operationId: createPaidLeaveRequestApi
    tags:
      - Approval
    summary: 有給休暇申請
    requestBody:
      $ref: "../components/requestBodies.yaml#/CreatePaidLeaveRequestBody"
    responses:
      "201":
        description: 申請成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/approval/PaidLeaveRequestResponse.yaml#/PaidLeaveRequestResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

paidLeaveApprove:
  patch:
    operationId: approvePaidLeaveRequestApi
    tags:
      - Approval
    summary: 有給休暇申請承認
    parameters:
      - $ref: "../components/parameters.yaml#/PathPaidLeaveRequestId"
