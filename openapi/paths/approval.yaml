approvalList:
  get:
    operationId: listApprovals
    tags:
      - Approval
    summary: 申請・承認一覧取得
    description: 自分の申請一覧と、承認権限がある場合は承認待ちの申請一覧を返す。
    responses:
      "200":
        description: 申請一覧
        content:
          application/json:
            schema:
              $ref: "../components/schemas/approval/ApprovalListResponse.yaml#/ApprovalListResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

paidLeaveRequests:
  post:
    operationId: createPaidLeaveRequest
    tags:
      - Approval
    summary: 有給休暇申請
    description: 有給休暇の取得を申請する。
    requestBody:
      $ref: "../components/requestBodies.yaml#/CreatePaidLeaveRequestBody"
    responses:
      "201":
        description: 申請成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/approval/PaidLeaveRequestResponse.yaml#/PaidLeaveRequestResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

paidLeaveApprove:
  patch:
    operationId: approvePaidLeaveRequest
    tags:
      - Approval
    summary: 有給休暇申請承認
    description: 指定された有給休暇申請を承認する。承認権限が必要。
    parameters:
      - $ref: "../components/parameters.yaml#/PathPaidLeaveRequestId"
    responses:
      "200":
        description: 承認成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/approval/PaidLeaveRequestResponse.yaml#/PaidLeaveRequestResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "403":
        $ref: "../components/responses.yaml#/Forbidden"
      "404":
        $ref: "../components/responses.yaml#/NotFound"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

paidLeaveReject:
  patch:
    operationId: rejectPaidLeaveRequest
    tags:
      - Approval
    summary: 有給休暇申請却下
    description: 指定された有給休暇申請を却下する。承認権限が必要。
    parameters:
      - $ref: "../components/parameters.yaml#/PathPaidLeaveRequestId"
    responses:
      "200":
        description: 却下成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/approval/PaidLeaveRequestResponse.yaml#/PaidLeaveRequestResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "403":
        $ref: "../components/responses.yaml#/Forbidden"
      "404":
        $ref: "../components/responses.yaml#/NotFound"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

paidLeaveCancel:
  patch:
    operationId: cancelPaidLeaveRequest
    tags:
      - Approval
    summary: 有給休暇申請キャンセル
    description: 自分の有給休暇申請をキャンセルする。
    parameters:
      - $ref: "../components/parameters.yaml#/PathPaidLeaveRequestId"
    responses:
      "200":
        description: キャンセル成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/approval/PaidLeaveRequestResponse.yaml#/PaidLeaveRequestResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "403":
        $ref: "../components/responses.yaml#/Forbidden"
      "404":
        $ref: "../components/responses.yaml#/NotFound"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

