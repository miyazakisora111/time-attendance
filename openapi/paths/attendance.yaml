latestAttendance:
  get:
    operationId: getLatestAttendance
    tags:
      - Attendance
    summary: 最新の勤怠情報取得
    description: ログイン中ユーザーの最新の勤怠情報を返す。
    responses:
      "200":
        description: 最新の勤怠情報
        content:
          application/json:
            schema:
              $ref: "../components/schemas/attendance/AttendanceResponse.yaml#/AttendanceResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

clock:
  post:
    operationId: createClock
    tags:
      - Attendance
    summary: 打刻
    description: |
      出勤・退勤・休憩開始・休憩終了の打刻を行う。
      `action` で打刻種別を指定する。
    requestBody:
      $ref: "../components/requestBodies.yaml#/AttendanceClockBody"
    responses:
      "200":
        description: 打刻成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/attendance/AttendanceResponse.yaml#/AttendanceResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "409":
        $ref: "../components/responses.yaml#/Conflict"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

attendances:
  get:
    operationId: listAttendances
    tags:
      - Attendance
    summary: 勤怠一覧取得
    description: 指定期間のログインユーザー勤怠一覧をページネーション付きで返す。
    parameters:
      - $ref: "../components/parameters.yaml#/QueryDateFrom"
      - $ref: "../components/parameters.yaml#/QueryDateTo"
      - $ref: "../components/parameters.yaml#/QueryPage"
      - $ref: "../components/parameters.yaml#/QueryPerPage"
    responses:
      "200":
        description: 勤怠一覧
        content:
          application/json:
            schema:
              type: object
              required:
                - items
                - pageInfo
              properties:
                items:
                  type: array
                  items:
                    $ref: "../components/schemas/attendance/AttendanceResponse.yaml#/AttendanceResponse"
                pageInfo:
                  $ref: "../components/schemas/common/PageInfo.yaml#/PageInfo"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"
  post:
    operationId: createAttendance
    tags:
      - Attendance
    summary: 勤怠の新規登録
    description: 勤怠レコードを新規作成する。
    requestBody:
      $ref: "../components/requestBodies.yaml#/AttendanceStoreBody"
    responses:
      "201":
        description: 登録成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/attendance/AttendanceResponse.yaml#/AttendanceResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

attendanceUpdate:
  patch:
    operationId: updateAttendance
    tags:
      - Attendance
    summary: 勤怠の更新
    description: 勤怠レコードを更新する。
    parameters:
      - $ref: "../components/parameters.yaml#/PathAttendanceId"
    requestBody:
      $ref: "../components/requestBodies.yaml#/AttendanceUpdateBody"
    responses:
      "200":
        description: 更新成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/attendance/AttendanceResponse.yaml#/AttendanceResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "404":
        $ref: "../components/responses.yaml#/NotFound"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"
