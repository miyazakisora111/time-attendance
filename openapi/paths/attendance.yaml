attendance:
  get:
    operationId: todayAttendanceApi
    tags:
      - Attendance
    summary: 今日の勤怠取得
    responses:
      "200":
        description: 今日の勤怠情報
        content:
          application/json:
            schema:
              $ref: "../components/schemas/attendance/AttendanceResponse.yaml#/AttendanceResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

clockIn:
  post:
    operationId: clockInApi
    tags:
      - Attendance
    summary: 出勤打刻
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas/attendance/AttendanceClockInRequest.yaml#/AttendanceClockInRequest"
    responses:
      "200":
        description: 出勤成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/attendance/AttendanceResponse.yaml#/AttendanceResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "409":
        $ref: "../components/responses.yaml#/Conflict"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

clockOut:
  post:
    operationId: clockOutApi
    tags:
      - Attendance
    summary: 退勤打刻
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas/attendance/AttendanceClockOutRequest.yaml#/AttendanceClockOutRequest"
    responses:
      "200":
        description: 退勤成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/attendance/AttendanceResponse.yaml#/AttendanceResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "409":
        $ref: "../components/responses.yaml#/Conflict"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"
