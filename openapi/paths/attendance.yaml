latestAttendance:
  get:
    operationId: getLatestAttendance
    tags:
      - Attendance
    summary: 最新の勤怠情報取得
    description: ログイン中ユーザーの最新の勤怠情報を返す。
    responses:
      "200":
        description: 最新の勤怠情報
        content:
          application/json:
            schema:
              $ref: "../components/schemas/attendance/AttendanceResponse.yaml#/AttendanceResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

clockIn:
  post:
    operationId: createClockIn
    tags:
      - Attendance
    summary: 出勤打刻
    description: 当日の出勤打刻を行う。
    requestBody:
      $ref: "../components/requestBodies.yaml#/AttendanceClockInBody"
    responses:
      "200":
        description: 出勤成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/attendance/AttendanceResponse.yaml#/AttendanceResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "409":
        $ref: "../components/responses.yaml#/Conflict"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

clockOut:
  post:
    operationId: createClockOut
    tags:
      - Attendance
    summary: 退勤打刻
    description: 当日の退勤打刻を行う。
    requestBody:
      $ref: "../components/requestBodies.yaml#/AttendanceClockOutBody"
    responses:
      "200":
        description: 退勤成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/attendance/AttendanceResponse.yaml#/AttendanceResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "409":
        $ref: "../components/responses.yaml#/Conflict"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

breakStart:
  post:
    operationId: createBreakStart
    tags:
      - Attendance
    summary: 休憩開始打刻
    description: |
      勤務中のユーザーが休憩を開始する。
      サーバー側で現在時刻を休憩開始時刻として記録する。
      Request Body は空オブジェクト `{}` を送信する。
    requestBody:
      $ref: "../components/requestBodies.yaml#/AttendanceBreakStartBody"
    responses:
      "200":
        description: 休憩開始成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/attendance/AttendanceResponse.yaml#/AttendanceResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "409":
        $ref: "../components/responses.yaml#/Conflict"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

breakEnd:
  post:
    operationId: createBreakEnd
    tags:
      - Attendance
    summary: 休憩終了打刻
    description: |
      休憩中のユーザーが休憩を終了する。
      サーバー側で現在時刻を休憩終了時刻として記録する。
      Request Body は空オブジェクト `{}` を送信する。
    requestBody:
      $ref: "../components/requestBodies.yaml#/AttendanceBreakEndBody"
    responses:
      "200":
        description: 休憩終了成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/attendance/AttendanceResponse.yaml#/AttendanceResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "409":
        $ref: "../components/responses.yaml#/Conflict"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

attendances:
  get:
    operationId: listAttendances
    tags:
      - Attendance
    summary: 勤怠一覧取得
    description: 指定期間のログインユーザー勤怠一覧をページネーション付きで返す。
    parameters:
      - $ref: "../components/parameters.yaml#/QueryDateFrom"
      - $ref: "../components/parameters.yaml#/QueryDateTo"
      - $ref: "../components/parameters.yaml#/QueryPage"
      - $ref: "../components/parameters.yaml#/QueryPerPage"
    responses:
      "200":
        description: 勤怠一覧
        content:
          application/json:
            schema:
              type: object
              required:
                - items
                - pageInfo
              properties:
                items:
                  type: array
                  items:
                    $ref: "../components/schemas/attendance/AttendanceResponse.yaml#/AttendanceResponse"
                pageInfo:
                  $ref: "../components/schemas/common/PageInfo.yaml#/PageInfo"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"
  post:
    operationId: createAttendance
    tags:
      - Attendance
    summary: 勤怠の新規登録
    description: 勤怠レコードを新規作成する。
    requestBody:
      $ref: "../components/requestBodies.yaml#/AttendanceStoreBody"
    responses:
      "201":
        description: 登録成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/attendance/AttendanceResponse.yaml#/AttendanceResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

attendanceUpdate:
  patch:
    operationId: updateAttendance
    tags:
      - Attendance
    summary: 勤怠の更新
    description: 勤怠レコードを更新する。
    parameters:
      - $ref: "../components/parameters.yaml#/PathAttendanceId"
    requestBody:
      $ref: "../components/requestBodies.yaml#/AttendanceUpdateBody"
    responses:
      "200":
        description: 更新成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/attendance/AttendanceResponse.yaml#/AttendanceResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "404":
        $ref: "../components/responses.yaml#/NotFound"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"
