attendance:
  get:
    operationId: todayAttendanceApi
    tags:
      - Attendance
    summary: 今日の勤怠取得
    responses:
      "200":
        description: 今日の勤怠情報
        content:
          application/json:
            schema:
              $ref: "../components/schemas/attendance/AttendanceResponse.yaml#/AttendanceResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

clockIn:
  post:
    operationId: clockInApi
    tags:
      - Attendance
    summary: 出勤打刻
    requestBody:
      $ref: "../components/requestBodies.yaml#/AttendanceClockInBody"
    responses:
      "200":
        description: 出勤成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/attendance/AttendanceResponse.yaml#/AttendanceResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "409":
        $ref: "../components/responses.yaml#/Conflict"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

clockOut:
  post:
    operationId: clockOutApi
    tags:
      - Attendance
    summary: 退勤打刻
    requestBody:
      $ref: "../components/requestBodies.yaml#/AttendanceClockOutBody"
    responses:
      "200":
        description: 退勤成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/attendance/AttendanceResponse.yaml#/AttendanceResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "409":
        $ref: "../components/responses.yaml#/Conflict"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

attendances:
  get:
    operationId: listAttendancesApi
    tags:
      - Attendance
    summary: 勤怠一覧取得
    parameters:
      - $ref: "../components/parameters.yaml#/QueryDateFrom"
      - $ref: "../components/parameters.yaml#/QueryDateTo"
    responses:
      "200":
        description: 勤怠一覧
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../components/schemas/attendance/AttendanceResponse.yaml#/AttendanceResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"
  post:
    operationId: storeAttendanceApi
    tags:
      - Attendance
    summary: 勤怠の新規登録
    requestBody:
      $ref: "../components/requestBodies.yaml#/AttendanceStoreBody"
    responses:
      "201":
        description: 登録成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/attendance/AttendanceResponse.yaml#/AttendanceResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

attendanceUpdate:
  patch:
    operationId: updateAttendanceApi
    tags:
      - Attendance
    summary: 勤怠の更新
    parameters:
      - $ref: "../components/parameters.yaml#/PathAttendanceId"
    requestBody:
      $ref: "../components/requestBodies.yaml#/AttendanceUpdateBody"
    responses:
      "200":
        description: 更新成功
        content:
          application/json:
            schema:
              $ref: "../components/schemas/attendance/AttendanceResponse.yaml#/AttendanceResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "404":
        $ref: "../components/responses.yaml#/NotFound"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"
