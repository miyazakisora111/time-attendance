calendar:
  get:
    operationId: getCalendarApi
    tags:
      - Schedule
    summary: 月次カレンダー取得
    parameters:
      - name: year
        in: query
        required: true
        schema:
          type: integer
          minimum: 2000
          maximum: 2100
      - name: month
        in: query
        required: true
        schema:
          type: integer
          minimum: 1
          maximum: 12
    responses:
      '200':
        description: 対象月の日付一覧
        content:
          application/json:
            schema:
              $ref: '../components/schemas/schedule/CalendarResponse.yaml#/CalendarResponse'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '422':
        $ref: '../components/responses.yaml#/ValidationError'
      '500':
        $ref: '../components/responses.yaml#/InternalServerError'
