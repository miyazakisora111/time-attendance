calendar:
  get:
    operationId: getCalendarApi
    tags:
      - Schedule
    summary: 月次カレンダー取得
    parameters:
      - $ref: "../components/parameters.yaml#/QueryYear"
      - $ref: "../components/parameters.yaml#/QueryMonth"
    responses:
      "200":
        description: 対象月の日付一覧
        content:
          application/json:
            schema:
              $ref: "../components/schemas/schedule/CalendarResponse.yaml#/CalendarResponse"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
      "422":
        $ref: "../components/responses.yaml#/ValidationError"
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"
