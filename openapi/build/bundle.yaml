openapi: 3.0.3
info:
  title: TimeAttendance API
  version: 1.0.0
  description: 勤怠管理API
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: '{scheme}://{host}/api'
    description: API Server
    variables:
      scheme:
        default: http
        enum:
          - http
          - https
      host:
        default: localhost:8000
        enum:
          - localhost:8000
          - api.example.com
security:
  - BearerAuth: []
tags:
  - name: Attendance
    description: 勤怠に関するAPI
  - name: Auth
    description: 認証管理API
  - name: Dashboard
    description: ダッシュボードAPI
  - name: Schedule
    description: スケジュールAPI
  - name: Team
    description: チームAPI
  - name: Settings
    description: 設定API
paths:
  /login:
    post:
      operationId: loginApi
      tags:
        - Auth
      summary: ログイン
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /logout:
    post:
      operationId: logoutApi
      tags:
        - Auth
      summary: ログアウト
      responses:
        '200':
          description: ログアウト成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /authme:
    get:
      operationId: authMeApi
      tags:
        - Auth
      summary: ログイン中ユーザー情報取得
      responses:
        '200':
          description: 認証済みユーザー情報
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /attendances/attendance:
    get:
      operationId: todayAttendanceApi
      tags:
        - Attendance
      summary: 今日の勤怠取得
      responses:
        '200':
          description: 今日の勤怠情報
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /attendances/clock-in:
    post:
      operationId: clockInApi
      tags:
        - Attendance
      summary: 出勤打刻
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceClockInRequest'
      responses:
        '200':
          description: 出勤成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /attendances/clock-out:
    post:
      operationId: clockOutApi
      tags:
        - Attendance
      summary: 退勤打刻
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceClockOutRequest'
      responses:
        '200':
          description: 退勤成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /dashboard:
    get:
      operationId: getDashboardApi
      tags:
        - Dashboard
      summary: ダッシュボード集計取得
      responses:
        '200':
          description: ダッシュボード情報
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/calendar:
    get:
      operationId: getCalendarApi
      tags:
        - Schedule
      summary: 月次カレンダー取得
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
        - name: month
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
      responses:
        '200':
          description: 対象月の日付一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /team/members:
    get:
      operationId: getTeamMembersApi
      tags:
        - Team
      summary: チームメンバー一覧取得
      responses:
        '200':
          description: チームメンバー一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMembersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /settings:
    get:
      operationId: getSettingsApi
      tags:
        - Settings
      summary: ユーザー設定取得
      responses:
        '200':
          description: ユーザー設定
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      operationId: updateSettingsApi
      tags:
        - Settings
      summary: ユーザー設定更新
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSettingsRequest'
      responses:
        '200':
          description: 更新後ユーザー設定
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  responses:
    Unauthorized:
      description: 認証エラー
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: バリデーションエラー
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
    InternalServerError:
      description: サーバーエラー
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: 排他エラー
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: 認可エラー
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: リソース未存在エラー
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 255
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 255
          pattern: ^(?=.*[A-Za-z])(?=.*\d).+$
    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT access token
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: エラーが発生しました
    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: バリデーションエラー
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    UserResponse:
      type: object
      description: ユーザー情報
      required:
        - user
      properties:
        user:
          type: object
          required:
            - id
            - name
            - email
            - roles
          properties:
            id:
              type: string
              format: uuid
              description: ユーザーID
              example: 9e6f1c4a-8b3b-4b2a-9d2e-1f3b6c7d8e9f
            name:
              type: string
              description: 表示名
              example: 宮﨑 壮来
            email:
              type: string
              format: email
              description: メールアドレス
              example: sora.miyazaki@example.com
            roles:
              type: array
              description: 付与ロール名一覧
              items:
                type: string
                example: manager
              example:
                - member
                - manager
            settings:
              type: object
              nullable: true
              description: ユーザー設定（任意のキーを許容、存在しない場合は null）
              additionalProperties: true
              example:
                theme: dark
                language: ja
    AttendanceResponse:
      type: object
      required:
        - user_id
        - work_date
        - start_time
      properties:
        user_id:
          type: string
          format: uuid
        work_date:
          type: string
          format: date
        start_time:
          type: string
          format: date-time
          nullable: true
        end_time:
          type: string
          format: date-time
          nullable: true
    AttendanceClockInRequest:
      type: object
      required:
        - work_date
        - start_time
      properties:
        work_date:
          type: string
          format: date
        start_time:
          type: string
          format: date-time
    AttendanceClockOutRequest:
      type: object
      required:
        - work_date
        - end_time
      properties:
        work_date:
          type: string
          format: date
        end_time:
          type: string
          format: date-time
    DashboardResponse:
      type: object
      required:
        - user
        - clockStatus
        - todayRecord
        - stats
        - recentRecords
        - pendingOvertimeRequests
      properties:
        user:
          type: object
          required:
            - id
            - name
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        clockStatus:
          type: string
          enum:
            - out
            - in
            - break
        todayRecord:
          type: object
          required:
            - clockInTime
            - totalWorkedHours
          properties:
            clockInTime:
              type: string
              nullable: true
              example: '09:00'
            totalWorkedHours:
              type: number
              format: float
              nullable: true
              example: 5.5
        stats:
          type: object
          required:
            - totalHours
            - targetHours
            - workDays
            - remainingDays
            - avgHours
            - avgHoursDiff
            - overtimeHours
            - overtimeDiff
          properties:
            totalHours:
              type: number
              format: float
            targetHours:
              type: number
              format: float
            workDays:
              type: integer
            remainingDays:
              type: integer
            avgHours:
              type: number
              format: float
            avgHoursDiff:
              type: number
              format: float
            overtimeHours:
              type: number
              format: float
            overtimeDiff:
              type: number
              format: float
        recentRecords:
          type: array
          items:
            type: object
            required:
              - date
              - day
              - clockIn
              - clockOut
              - workHours
              - status
            properties:
              date:
                type: string
                example: 2026/03/14
              day:
                type: string
                example: 土
              clockIn:
                type: string
                nullable: true
                example: '09:00'
              clockOut:
                type: string
                nullable: true
                example: '18:00'
              workHours:
                type: number
                format: float
                nullable: true
                example: 8
              status:
                type: string
                enum:
                  - 通常
                  - 残業
                  - 休日
        pendingOvertimeRequests:
          type: integer
    CalendarSummary:
      type: object
      required:
        - totalWorkHours
        - targetHours
        - scheduledWorkDays
        - overtimeHours
        - paidLeaveDays
        - remainingPaidLeaveDays
      properties:
        totalWorkHours:
          type: number
          format: float
          example: 154.5
        targetHours:
          type: number
          format: float
          example: 160
        scheduledWorkDays:
          type: integer
          example: 20
        overtimeHours:
          type: number
          format: float
          example: 12
        paidLeaveDays:
          type: number
          format: float
          example: 2
        remainingPaidLeaveDays:
          type: number
          format: float
          example: 12.5
    CalendarDay:
      type: object
      required:
        - date
        - label
        - dayOfWeek
        - status
        - isToday
        - isHoliday
      properties:
        date:
          type: string
          format: date
          example: '2026-03-19'
        label:
          type: string
          example: 3/19
        dayOfWeek:
          type: string
          example: 木
        status:
          type: string
          enum:
            - working
            - 'off'
            - holiday
            - pending
        shift:
          type: string
          nullable: true
          example: 通常勤務
        timeRange:
          type: string
          nullable: true
          example: 09:00 - 18:00
        location:
          type: string
          nullable: true
          example: Office-A
        note:
          type: string
          nullable: true
          example: 春分の日
        isToday:
          type: boolean
        isHoliday:
          type: boolean
    CalendarResponse:
      type: object
      required:
        - year
        - month
        - summary
        - days
      properties:
        year:
          type: integer
          minimum: 2000
          maximum: 2100
        month:
          type: integer
          minimum: 1
          maximum: 12
        summary:
          $ref: '#/components/schemas/CalendarSummary'
        days:
          type: array
          items:
            $ref: '#/components/schemas/CalendarDay'
    TeamMember:
      type: object
      required:
        - id
        - name
        - role
        - department
        - status
        - email
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        role:
          type: string
        department:
          type: string
        status:
          type: string
          enum:
            - working
            - break
            - 'off'
            - leave
        clockInTime:
          type: string
          nullable: true
          example: '09:00'
        email:
          type: string
          format: email
    TeamMembersResponse:
      type: object
      required:
        - members
      properties:
        members:
          type: array
          items:
            $ref: '#/components/schemas/TeamMember'
    SettingsResponse:
      type: object
      required:
        - profile
        - notifications
        - security
        - theme
        - language
      properties:
        profile:
          type: object
          required:
            - name
            - email
            - department
            - role
            - employeeCode
          properties:
            name:
              type: string
              example: 田中 太郎
            email:
              type: string
              format: email
              example: t.tanaka@example.com
            department:
              type: string
              example: 営業部
            role:
              type: string
              example: 正社員
            employeeCode:
              type: string
              example: EMP-2024001
        notifications:
          type: object
          required:
            - clockInReminder
            - approvalNotification
            - leaveReminder
          properties:
            clockInReminder:
              type: boolean
            approvalNotification:
              type: boolean
            leaveReminder:
              type: boolean
        security:
          type: object
          required:
            - twoFactorEnabled
            - emailVerified
          properties:
            twoFactorEnabled:
              type: boolean
            emailVerified:
              type: boolean
            lastLoginAt:
              type: string
              format: date-time
              nullable: true
            passwordLastChangedAt:
              type: string
              format: date-time
              nullable: true
        theme:
          type: string
          enum:
            - light
            - dark
        language:
          type: string
          enum:
            - ja
            - en
    UpdateSettingsRequest:
      type: object
      required:
        - profile
        - notifications
        - theme
        - language
      properties:
        profile:
          type: object
          required:
            - name
            - email
          properties:
            name:
              type: string
              minLength: 1
              maxLength: 120
            email:
              type: string
              format: email
              maxLength: 255
        notifications:
          type: object
          required:
            - clockInReminder
            - approvalNotification
            - leaveReminder
          properties:
            clockInReminder:
              type: boolean
            approvalNotification:
              type: boolean
            leaveReminder:
              type: boolean
        theme:
          type: string
          enum:
            - light
            - dark
        language:
          type: string
          enum:
            - ja
            - en
