openapi: 3.0.3
info:
  title: TimeAttendance API
  version: 1.0.0
  description: 勤怠管理API
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: '{scheme}://{host}/api'
    description: API Server
    variables:
      scheme:
        default: http
        enum:
          - http
          - https
      host:
        default: localhost:8000
        enum:
          - localhost:8000
          - api.example.com
security:
  - BearerAuth: []
tags:
  - name: Attendance
    description: 勤怠に関するAPI
  - name: Auth
    description: 認証管理API
  - name: Dashboard
    description: ダッシュボードAPI
  - name: Schedule
    description: スケジュールAPI
  - name: Team
    description: チームAPI
  - name: Settings
    description: 設定API
paths:
  /login:
    post:
      operationId: loginApi
      tags:
        - Auth
      summary: ログイン
      security: []
      requestBody:
        $ref: '#/components/requestBodies/LoginBody'
      responses:
        '200':
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /logout:
    post:
      operationId: logoutApi
      tags:
        - Auth
      summary: ログアウト
      responses:
        '200':
          description: ログアウト成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /authme:
    get:
      operationId: authMeApi
      tags:
        - Auth
      summary: ログイン中ユーザー情報取得
      responses:
        '200':
          description: 認証済みユーザー情報
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /attendances/attendance:
    get:
      operationId: todayAttendanceApi
      tags:
        - Attendance
      summary: 今日の勤怠取得
      responses:
        '200':
          description: 今日の勤怠情報
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /attendances/clock-in:
    post:
      operationId: clockInApi
      tags:
        - Attendance
      summary: 出勤打刻
      requestBody:
        $ref: '#/components/requestBodies/AttendanceClockInBody'
      responses:
        '200':
          description: 出勤成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /attendances/clock-out:
    post:
      operationId: clockOutApi
      tags:
        - Attendance
      summary: 退勤打刻
      requestBody:
        $ref: '#/components/requestBodies/AttendanceClockOutBody'
      responses:
        '200':
          description: 退勤成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /attendances:
    get:
      operationId: listAttendancesApi
      tags:
        - Attendance
      summary: 勤怠一覧取得
      parameters:
        - $ref: '#/components/parameters/QueryDateFrom'
        - $ref: '#/components/parameters/QueryDateTo'
      responses:
        '200':
          description: 勤怠一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AttendanceResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: storeAttendanceApi
      tags:
        - Attendance
      summary: 勤怠の新規登録
      requestBody:
        $ref: '#/components/requestBodies/AttendanceStoreBody'
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /attendances/{attendance}:
    patch:
      operationId: updateAttendanceApi
      tags:
        - Attendance
      summary: 勤怠の更新
      parameters:
        - $ref: '#/components/parameters/PathAttendanceId'
      requestBody:
        $ref: '#/components/requestBodies/AttendanceUpdateBody'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /dashboard:
    get:
      operationId: getDashboardApi
      tags:
        - Dashboard
      summary: ダッシュボード集計取得
      responses:
        '200':
          description: ダッシュボード情報
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /dashboard/clock:
    post:
      operationId: dashboardClockApi
      tags:
        - Dashboard
      summary: 打刻アクション（出勤・退勤・休憩開始・休憩終了）
      requestBody:
        $ref: '#/components/requestBodies/DashboardClockBody'
      responses:
        '200':
          description: 打刻成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/calendar:
    get:
      operationId: getCalendarApi
      tags:
        - Schedule
      summary: 月次カレンダー取得
      parameters:
        - $ref: '#/components/parameters/QueryYear'
        - $ref: '#/components/parameters/QueryMonth'
      responses:
        '200':
          description: 対象月の日付一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /team/members:
    get:
      operationId: getTeamMembersApi
      tags:
        - Team
      summary: チームメンバー一覧取得
      responses:
        '200':
          description: チームメンバー一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMembersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /settings:
    get:
      operationId: getSettingsApi
      tags:
        - Settings
      summary: ユーザー設定取得
      responses:
        '200':
          description: ユーザー設定
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      operationId: updateSettingsApi
      tags:
        - Settings
      summary: ユーザー設定更新
      requestBody:
        $ref: '#/components/requestBodies/UpdateSettingsBody'
      responses:
        '200':
          description: 更新後ユーザー設定
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  schemas:
    ClockAction:
      type: string
      description: 打刻アクション種別
      enum:
        - in
        - out
        - break_start
        - break_end
    ClockStatus:
      type: string
      description: 現在の打刻状態
      enum:
        - out
        - in
        - break
    ThemeType:
      type: string
      description: UIテーマ設定
      enum:
        - light
        - dark
    LanguageCode:
      type: string
      description: 表示言語コード
      enum:
        - ja
        - en
    CalendarDayStatus:
      type: string
      description: カレンダー日付の勤務状態
      enum:
        - working
        - 'off'
        - holiday
        - pending
    TeamMemberStatus:
      type: string
      description: チームメンバーの勤務状態
      enum:
        - working
        - break
        - 'off'
        - leave
    AttendanceStatus:
      type: string
      description: 勤怠レコードの勤務区分
      enum:
        - working
        - out
        - break
    UserStatus:
      type: string
      description: ユーザーアカウントの状態
      enum:
        - active
        - inactive
        - suspended
        - deleted
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 255
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 255
          pattern: ^(?=.*[A-Za-z])(?=.*\d).+$
    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT access token
    LogoutResponse:
      type: object
      description: ログアウト成功レスポンス
      properties:
        message:
          type: string
          example: Logged out successfully
    UserResponse:
      type: object
      description: ユーザー情報
      required:
        - user
      properties:
        user:
          type: object
          required:
            - id
            - name
            - email
            - roles
          properties:
            id:
              type: string
              format: uuid
              description: ユーザーID
              example: 9e6f1c4a-8b3b-4b2a-9d2e-1f3b6c7d8e9f
            name:
              type: string
              description: 表示名
              example: 宮﨑 壮来
            email:
              type: string
              format: email
              description: メールアドレス
              example: sora.miyazaki@example.com
            roles:
              type: array
              description: 付与ロール名一覧
              items:
                type: string
                example: manager
              example:
                - member
                - manager
            settings:
              type: object
              nullable: true
              description: ユーザー設定
              properties:
                theme:
                  $ref: '#/components/schemas/ThemeType'
                language:
                  $ref: '#/components/schemas/LanguageCode'
              example:
                theme: dark
                language: ja
    AttendanceClockInRequest:
      type: object
      required:
        - work_date
        - start_time
      properties:
        work_date:
          type: string
          format: date
        start_time:
          type: string
          format: date-time
    AttendanceClockOutRequest:
      type: object
      required:
        - work_date
        - end_time
      properties:
        work_date:
          type: string
          format: date
        end_time:
          type: string
          format: date-time
    AttendanceStoreRequest:
      type: object
      required:
        - work_date
        - start_time
      properties:
        work_date:
          type: string
          format: date
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
          nullable: true
        note:
          type: string
          nullable: true
          maxLength: 500
    AttendanceUpdateRequest:
      type: object
      properties:
        start_time:
          type: string
          format: date-time
          nullable: true
        end_time:
          type: string
          format: date-time
          nullable: true
        note:
          type: string
          nullable: true
          maxLength: 500
    AttendanceResponse:
      type: object
      required:
        - user_id
        - work_date
        - start_time
      properties:
        user_id:
          type: string
          format: uuid
        work_date:
          type: string
          format: date
        start_time:
          type: string
          format: date-time
          nullable: true
        end_time:
          type: string
          format: date-time
          nullable: true
    AttendanceIndexRequest:
      type: object
      required:
        - from
        - to
      properties:
        from:
          type: string
          format: date
        to:
          type: string
          format: date
    DashboardClockRequest:
      type: object
      required:
        - action
      properties:
        action:
          $ref: '#/components/schemas/ClockAction'
    DashboardResponse:
      type: object
      required:
        - user
        - clockStatus
        - todayRecord
        - stats
        - recentRecords
        - pendingOvertimeRequests
      properties:
        user:
          $ref: '#/components/schemas/DashboardUser'
        clockStatus:
          $ref: '#/components/schemas/ClockStatus'
        todayRecord:
          $ref: '#/components/schemas/DashboardTodayRecord'
        stats:
          $ref: '#/components/schemas/DashboardStats'
        recentRecords:
          type: array
          items:
            $ref: '#/components/schemas/DashboardRecentRecord'
        pendingOvertimeRequests:
          type: integer
    DashboardUser:
      type: object
      description: ダッシュボード用ユーザー情報
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
    DashboardTodayRecord:
      type: object
      description: 今日の勤怠レコード
      required:
        - clockInTime
        - totalWorkedHours
      properties:
        clockInTime:
          type: string
          nullable: true
          example: '09:00'
        totalWorkedHours:
          type: number
          format: float
          nullable: true
          example: 5.5
    DashboardStats:
      type: object
      description: ダッシュボード月次統計
      required:
        - totalHours
        - targetHours
        - workDays
        - remainingDays
        - avgHours
        - avgHoursDiff
        - overtimeHours
        - overtimeDiff
      properties:
        totalHours:
          type: number
          format: float
        targetHours:
          type: number
          format: float
        workDays:
          type: integer
        remainingDays:
          type: integer
        avgHours:
          type: number
          format: float
        avgHoursDiff:
          type: number
          format: float
        overtimeHours:
          type: number
          format: float
        overtimeDiff:
          type: number
          format: float
    DashboardRecentRecord:
      type: object
      description: 直近の勤怠レコード
      required:
        - date
        - day
        - clockIn
        - clockOut
        - workHours
        - status
      properties:
        date:
          type: string
          example: 2026/03/14
        day:
          type: string
          example: 土
        clockIn:
          type: string
          nullable: true
          example: '09:00'
        clockOut:
          type: string
          nullable: true
          example: '18:00'
        workHours:
          type: number
          format: float
          nullable: true
          example: 8
        status:
          $ref: '#/components/schemas/AttendanceStatus'
    CalendarIndexRequest:
      type: object
      required:
        - year
        - month
      properties:
        year:
          type: integer
          minimum: 2000
          maximum: 2100
        month:
          type: integer
          minimum: 1
          maximum: 12
    CalendarResponse:
      type: object
      required:
        - year
        - month
        - summary
        - days
      properties:
        year:
          type: integer
          minimum: 2000
          maximum: 2100
        month:
          type: integer
          minimum: 1
          maximum: 12
        summary:
          $ref: '#/components/schemas/CalendarSummary'
        days:
          type: array
          items:
            $ref: '#/components/schemas/CalendarDay'
    CalendarSummary:
      type: object
      description: カレンダー月次サマリー
      required:
        - totalWorkHours
        - targetHours
        - scheduledWorkDays
        - overtimeHours
        - paidLeaveDays
        - remainingPaidLeaveDays
      properties:
        totalWorkHours:
          type: number
          format: float
          example: 154.5
        targetHours:
          type: number
          format: float
          example: 160
        scheduledWorkDays:
          type: integer
          example: 20
        overtimeHours:
          type: number
          format: float
          example: 12
        paidLeaveDays:
          type: number
          format: float
          example: 2
        remainingPaidLeaveDays:
          type: number
          format: float
          example: 12.5
    CalendarDay:
      type: object
      description: カレンダー1日分の情報
      required:
        - date
        - label
        - dayOfWeek
        - status
        - isToday
        - isHoliday
      properties:
        date:
          type: string
          format: date
          example: '2026-03-19'
        label:
          type: string
          example: 3/19
        dayOfWeek:
          type: string
          example: 木
        status:
          $ref: '#/components/schemas/CalendarDayStatus'
        shift:
          type: string
          nullable: true
          example: 通常勤務
        timeRange:
          type: string
          nullable: true
          example: 09:00 - 18:00
        location:
          type: string
          nullable: true
          example: Office-A
        note:
          type: string
          nullable: true
          example: 春分の日
        isToday:
          type: boolean
        isHoliday:
          type: boolean
    SettingsResponse:
      type: object
      required:
        - profile
        - notifications
        - security
        - theme
        - language
      properties:
        profile:
          $ref: '#/components/schemas/SettingsProfile'
        notifications:
          $ref: '#/components/schemas/SettingsNotifications'
        security:
          $ref: '#/components/schemas/SettingsSecurity'
        theme:
          $ref: '#/components/schemas/ThemeType'
        language:
          $ref: '#/components/schemas/LanguageCode'
    UpdateSettingsRequest:
      type: object
      required:
        - profile
        - notifications
        - theme
        - language
      properties:
        profile:
          $ref: '#/components/schemas/UpdateSettingsProfile'
        notifications:
          $ref: '#/components/schemas/SettingsNotifications'
        theme:
          $ref: '#/components/schemas/ThemeType'
        language:
          $ref: '#/components/schemas/LanguageCode'
    SettingsProfile:
      type: object
      description: ユーザープロフィール情報（レスポンス用）
      required:
        - name
        - email
        - department
        - role
        - employeeCode
      properties:
        name:
          type: string
          example: 田中 太郎
        email:
          type: string
          format: email
          example: t.tanaka@example.com
        department:
          type: string
          example: 営業部
        role:
          type: string
          example: 正社員
        employeeCode:
          type: string
          example: EMP-2024001
    UpdateSettingsProfile:
      type: object
      description: ユーザープロフィール更新（リクエスト用）
      required:
        - name
        - email
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        email:
          type: string
          format: email
          maxLength: 255
    SettingsNotifications:
      type: object
      description: 通知設定
      required:
        - clockInReminder
        - approvalNotification
        - leaveReminder
      properties:
        clockInReminder:
          type: boolean
        approvalNotification:
          type: boolean
        leaveReminder:
          type: boolean
    SettingsSecurity:
      type: object
      description: セキュリティ設定
      required:
        - twoFactorEnabled
        - emailVerified
      properties:
        twoFactorEnabled:
          type: boolean
        emailVerified:
          type: boolean
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        passwordLastChangedAt:
          type: string
          format: date-time
          nullable: true
    TeamMembersResponse:
      type: object
      required:
        - members
      properties:
        members:
          type: array
          items:
            $ref: '#/components/schemas/TeamMember'
    TeamMember:
      type: object
      description: チームメンバー情報
      required:
        - id
        - name
        - role
        - department
        - status
        - email
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        role:
          type: string
        department:
          type: string
        status:
          $ref: '#/components/schemas/TeamMemberStatus'
        clockInTime:
          type: string
          nullable: true
          example: '09:00'
        email:
          type: string
          format: email
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: エラーが発生しました
    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: バリデーションエラー
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
  parameters:
    QueryDateFrom:
      name: from
      in: query
      required: true
      description: 検索期間の開始日
      schema:
        type: string
        format: date
    QueryDateTo:
      name: to
      in: query
      required: true
      description: 検索期間の終了日
      schema:
        type: string
        format: date
    PathAttendanceId:
      name: attendance
      in: path
      required: true
      description: 勤怠レコードID
      schema:
        type: string
        format: uuid
    QueryYear:
      name: year
      in: query
      required: true
      description: 対象年
      schema:
        type: integer
        minimum: 2000
        maximum: 2100
    QueryMonth:
      name: month
      in: query
      required: true
      description: 対象月
      schema:
        type: integer
        minimum: 1
        maximum: 12
  requestBodies:
    LoginBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LoginRequest'
    AttendanceClockInBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AttendanceClockInRequest'
    AttendanceClockOutBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AttendanceClockOutRequest'
    AttendanceStoreBody:
      required: true
      content:
