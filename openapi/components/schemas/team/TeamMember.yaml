TeamMember:
  type: object
  description: チームメンバー情報
  required:
    - id
    - name
    - role
    - department
    - status
    - email
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
    role:
      type: string
    department:
      type: string
    status:
      $ref: "../../enums/TeamMemberStatus.yaml#/TeamMemberStatus"
    clockInTime:
      type: string
      nullable: true
      example: "09:00"
    email:
      type: string
      format: email
