CalendarResponse:
  type: object
  required:
    - year
    - month
    - summary
    - days
  properties:
    year:
      type: integer
      minimum: 2000
      maximum: 2100
    month:
      type: integer
      minimum: 1
      maximum: 12
    summary:
      $ref: "./CalendarSummary.yaml#/CalendarSummary"
    days:
      type: array
      items:
        $ref: "./CalendarDay.yaml#/CalendarDay"
