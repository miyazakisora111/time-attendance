# 勤怠レコードの表示用HTTPレスポンス
AttendanceResponse:
  type: object
  description: 勤怠レコードの表示用のHTTPレスポンス
  required:
    - userId
    - workDate
    - clockInAt
    - clockStatus
  properties:
    id:
      type: string
      format: uuid
      description: 勤怠レコードID
    userId:
      type: string
      format: uuid
      description: 対象ユーザーID
    workDate:
      type: string
      format: date
      description: 勤務日
    clockStatus:
      $ref: "../../enums/ClockStatus.yaml#/ClockStatus"
    clockInAt:
      type: string
      format: date-time
      nullable: true
      description: 出勤日時
    clockOutAt:
      type: string
      format: date-time
      nullable: true
      description: 退勤日時
    breakMinutes:
      type: integer
      nullable: true
      description: 休憩合計（分）
    workedMinutes:
      type: integer
      nullable: true
      description: 実働時間（分）