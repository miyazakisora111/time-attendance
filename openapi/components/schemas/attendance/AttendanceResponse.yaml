AttendanceResponse:
  type: object
  required:
    - user_id
    - work_date
    - start_time
  properties:
    user_id:
      type: string
      format: uuid
    work_date:
      type: string
      format: date
    start_time:
      type: string
      format: date-time
      nullable: true
    end_time:
      type: string
      format: date-time
      nullable: true
    break_minutes:
      type: integer
      nullable: true
      description: 休憩合計(分)
    worked_minutes:
      type: integer
      nullable: true
      description: 実働時間(分)
