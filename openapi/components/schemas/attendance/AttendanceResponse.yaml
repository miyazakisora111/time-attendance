AttendanceResponse:
  type: object
  required:
    - userId
    - workDate
    - startTime
    - clockStatus
  properties:
    userId:
      type: string
      format: uuid
    workDate:
      type: string
      format: date
    clockStatus:
      $ref: "../../enums/ClockStatus.yaml#/ClockStatus"
    startTime:
      type: string
      format: date-time
      nullable: true
    endTime:
      type: string
      format: date-time
      nullable: true
    breakMinutes:
      type: integer
      nullable: true
      description: 休憩合計(分)
    workedMinutes:
      type: integer
      nullable: true
      description: 実働時間(分)
