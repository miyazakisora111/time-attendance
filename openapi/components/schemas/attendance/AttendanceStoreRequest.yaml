AttendanceStoreRequest:
  type: object
  description: 勤怠の新規作成のHTTPリクエスト
  required:
    - workDate
    - clockInAt
  properties:
    workDate:
      type: string
      format: date
      description: 勤務日
    clockInAt:
      type: string
      format: date-time
      description: 出勤日時
    clockOutAt:
      type: string
      format: date-time
      nullable: true
      description: 退勤日時