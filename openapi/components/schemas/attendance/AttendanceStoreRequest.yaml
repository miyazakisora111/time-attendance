AttendanceStoreRequest:
  type: object
  required:
    - workDate
    - startTime
  properties:
    workDate:
      type: string
      format: date
    startTime:
      type: string
      format: date-time
    endTime:
      type: string
      format: date-time
      nullable: true
    note:
      type: string
      nullable: true
      maxLength: 500
