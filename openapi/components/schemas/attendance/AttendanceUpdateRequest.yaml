# 既存の勤怠レコード部分更新HTTPリクエスト。
# PATCH なので送信したフィールドのみ更新される。
AttendanceUpdateRequest:
  type: object
  properties:
    clockInAt:
      type: string
      format: date-time
      nullable: true
      description: 出勤日時（ISO 8601）
    clockOutAt:
      type: string
      format: date-time
      nullable: true
      description: 退勤日時（ISO 8601）
    note:
      type: string
      nullable: true
      maxLength: 500
      description: 備考
