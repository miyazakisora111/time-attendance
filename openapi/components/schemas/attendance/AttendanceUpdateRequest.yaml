AttendanceUpdateRequest:
  type: object
  description: 勤怠レコード更新のHTTPリクエスト
  properties:
    clockInAt:
      type: string
      format: date-time
      nullable: true
      description: 出勤日時
    clockOutAt:
      type: string
      format: date-time
      nullable: true
      description: 退勤日時
    note:
      type: string
      nullable: true
      maxLength: 500
      description: 備考
