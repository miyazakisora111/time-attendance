SettingsResponse:
  type: object
  required:
    - profile
    - notifications
    - security
    - theme
    - language
  properties:
    profile:
      type: object
      required:
        - name
        - email
        - department
        - role
        - employeeCode
      properties:
        name:
          type: string
          example: 田中 太郎
        email:
          type: string
          format: email
          example: t.tanaka@example.com
        department:
          type: string
          example: 営業部
        role:
          type: string
          example: 正社員
        employeeCode:
          type: string
          example: EMP-2024001
    notifications:
      type: object
      required:
        - clockInReminder
        - approvalNotification
        - leaveReminder
      properties:
        clockInReminder:
          type: boolean
        approvalNotification:
          type: boolean
        leaveReminder:
          type: boolean
    security:
      type: object
      required:
        - twoFactorEnabled
        - emailVerified
      properties:
        twoFactorEnabled:
          type: boolean
        emailVerified:
          type: boolean
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        passwordLastChangedAt:
          type: string
          format: date-time
          nullable: true
    theme:
      type: string
      enum: [light, dark]
    language:
      type: string
      enum: [ja, en]
