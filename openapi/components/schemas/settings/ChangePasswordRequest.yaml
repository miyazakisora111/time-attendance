ChangePasswordRequest:
  type: object
  required:
    - current_password
    - new_password
    - new_password_confirmation
  properties:
    current_password:
      type: string
      format: password
      minLength: 8
      description: 現在のパスワード
    new_password:
      type: string
      format: password
      minLength: 8
      description: 新しいパスワード
    new_password_confirmation:
      type: string
      format: password
      minLength: 8
      description: 新しいパスワード（確認）
