ChangePasswordRequest:
  type: object
  required:
    - currentPassword
    - newPassword
    - newPasswordConfirmation
  properties:
    currentPassword:
      type: string
      format: password
      minLength: 8
      description: 現在のパスワード
    newPassword:
      type: string
      format: password
      minLength: 8
      description: 新しいパスワード
    newPasswordConfirmation:
      type: string
      format: password
      minLength: 8
      description: 新しいパスワード（確認）
