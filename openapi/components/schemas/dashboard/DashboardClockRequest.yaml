# ダッシュボードからの打刻HTTPリクエスト。
# action は ClockAction enum（in / out / breakStart / breakEnd）を指定する。
# HTTPレスポンスは更新後の DashboardResponse 全体を返す。
DashboardClockRequest:
  type: object
  required:
    - action
  properties:
    action:
      $ref: "../../enums/ClockAction.yaml#/ClockAction"
      description: 打刻アクション種別
