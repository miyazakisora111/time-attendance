DashboardResponse:
  type: object
  required:
    - user
    - clockStatus
    - todayRecord
    - stats
    - recentRecords
    - pendingOvertimeRequests
  properties:
    user:
      $ref: "./DashboardUser.yaml#/DashboardUser"
    clockStatus:
      $ref: "../../enums/ClockStatus.yaml#/ClockStatus"
    todayRecord:
      $ref: "./DashboardTodayRecord.yaml#/DashboardTodayRecord"
    stats:
      $ref: "./DashboardStats.yaml#/DashboardStats"
    recentRecords:
      type: array
      items:
        $ref: "./DashboardRecentRecord.yaml#/DashboardRecentRecord"
    pendingOvertimeRequests:
      type: integer
