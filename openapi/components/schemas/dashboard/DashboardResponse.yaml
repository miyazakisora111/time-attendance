DashboardResponse:
  type: object
  required:
    - user
    - clockStatus
    - todayRecord
    - stats
    - recentRecords
    - pendingOvertimeRequests
  properties:
    user:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
    clockStatus:
      type: string
      enum: [out, in, break]
    todayRecord:
      type: object
      required:
        - clockInTime
        - totalWorkedHours
      properties:
        clockInTime:
          type: string
          nullable: true
          example: "09:00"
        totalWorkedHours:
          type: number
          format: float
          nullable: true
          example: 5.5
    stats:
      type: object
      required:
        - totalHours
        - targetHours
        - workDays
        - remainingDays
        - avgHours
        - avgHoursDiff
        - overtimeHours
        - overtimeDiff
      properties:
        totalHours:
          type: number
          format: float
        targetHours:
          type: number
          format: float
        workDays:
          type: integer
        remainingDays:
          type: integer
        avgHours:
          type: number
          format: float
        avgHoursDiff:
          type: number
          format: float
        overtimeHours:
          type: number
          format: float
        overtimeDiff:
          type: number
          format: float
    recentRecords:
      type: array
      items:
        type: object
        required:
          - date
          - day
          - clockIn
          - clockOut
          - workHours
          - status
        properties:
          date:
            type: string
            example: "2026/03/14"
          day:
            type: string
            example: "土"
          clockIn:
            type: string
            nullable: true
            example: "09:00"
          clockOut:
            type: string
            nullable: true
            example: "18:00"
          workHours:
            type: number
            format: float
            nullable: true
            example: 8.0
          status:
            type: string
            enum: [通常, 残業, 休日]
    pendingOvertimeRequests:
      type: integer
