Attendance:
  type: object
  required:
    - id
    - user_id
    - work_date
    - start_time
  properties:
    id:
      type: string
      format: uuid
    user_id:
      type: string
      format: uuid
    work_date:
      type: string
      format: date
    start_time:
      type: string
      format: date-time
      nullable: true
    end_time:
      type: string
      format: date-time
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
