LoginRequest:
  type: object
  description: ログインのHTTPリクエスト
  required:
    - email
    - password
  properties:
    email:
      type: string
      format: email
      minLength: 1
      maxLength: 255
      description: メールアドレス
    password:
      type: string
      format: password
      minLength: 8
      maxLength: 255
      pattern: '^(?=.*[A-Za-z])(?=.*\d).+$'
      description: パスワード