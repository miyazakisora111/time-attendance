UserResponse:
  type: object
  description: ユーザー情報
  required:
    - user
  properties:
    user:
      type: object
      required:
        - id
        - name
        - email
        - roles
      properties:
        id:
          type: string
          format: uuid
          description: ユーザーID
          example: "9e6f1c4a-8b3b-4b2a-9d2e-1f3b6c7d8e9f"
        name:
          type: string
          description: 表示名
          example: "宮﨑 壮来"
        email:
          type: string
          format: email
          description: メールアドレス
          example: "sora.miyazaki@example.com"
        roles:
          type: array
          description: 付与ロール名一覧
          items:
            type: string
            example: "manager"
          example: ["member", "manager"]
        settings:
          type: object
          nullable: true
          description: ユーザー設定
          properties:
            theme:
              $ref: "../../enums/ThemeType.yaml#/ThemeType"
            language:
              $ref: "../../enums/LanguageCode.yaml#/LanguageCode"
          example:
            theme: "dark"
            language: "ja"
