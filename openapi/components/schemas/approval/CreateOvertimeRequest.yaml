CreateOvertimeRequest:
  type: object
  required:
    - workDate
    - startTime
    - endTime
  properties:
    workDate:
      type: string
      format: date
      description: 対象日
    startTime:
      type: string
      format: date-time
      description: 残業開始時刻
    endTime:
      type: string
      format: date-time
      description: 残業終了時刻
    reason:
      type: string
      maxLength: 500
      nullable: true
      description: 申請理由
