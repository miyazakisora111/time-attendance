CreateOvertimeRequest:
  type: object
  required:
    - work_date
    - start_time
    - end_time
  properties:
    work_date:
      type: string
      format: date
      description: 対象日
    start_time:
      type: string
      format: date-time
      description: 残業開始時刻
    end_time:
      type: string
      format: date-time
      description: 残業終了時刻
    reason:
      type: string
      maxLength: 500
      nullable: true
      description: 申請理由
