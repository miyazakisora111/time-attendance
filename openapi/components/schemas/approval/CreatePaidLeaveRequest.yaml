CreatePaidLeaveRequest:
  type: object
  required:
    - leaveDate
    - days
  properties:
    leaveDate:
      type: string
      format: date
      description: 取得日
    days:
      type: number
      minimum: 0.5
      maximum: 1
      description: 取得日数（0.5 or 1）
    reason:
      type: string
      maxLength: 500
      nullable: true
      description: 申請理由
