ApprovalListResponse:
  type: object
  required:
    - paidLeaveRequests
    - overtimeRequests
    - pendingPaidLeaveRequests
    - pendingOvertimeRequests
    - paidLeaveSummary
    - isApprover
  properties:
    paidLeaveRequests:
      type: array
      items:
        $ref: "./PaidLeaveRequestResponse.yaml#/PaidLeaveRequestResponse"
      description: 自分の有給休暇申請一覧
    overtimeRequests:
      type: array
      items:
        $ref: "./OvertimeRequestResponse.yaml#/OvertimeRequestResponse"
      description: 自分の残業申請一覧
    pendingPaidLeaveRequests:
      type: array
      items:
        $ref: "./PaidLeaveRequestResponse.yaml#/PaidLeaveRequestResponse"
      description: 承認待ち有給申請（承認者のみ）
    pendingOvertimeRequests:
      type: array
      items:
        $ref: "./OvertimeRequestResponse.yaml#/OvertimeRequestResponse"
      description: 承認待ち残業申請（承認者のみ）
    paidLeaveSummary:
      $ref: "./PaidLeaveSummary.yaml#/PaidLeaveSummary"
    isApprover:
      type: boolean
      description: 現在ユーザーが承認権限を持つか
