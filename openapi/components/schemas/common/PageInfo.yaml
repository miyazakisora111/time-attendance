PageInfo:
  type: object
  description: ページネーション情報
  required:
    - currentPage
    - perPage
    - totalItems
    - totalPages
  properties:
    currentPage:
      type: integer
      minimum: 1
      description: 現在のページ番号
      example: 1
    perPage:
      type: integer
      minimum: 1
      description: 1ページあたりの件数
      example: 20
    totalItems:
      type: integer
      minimum: 0
      description: 全件数
      example: 100
    totalPages:
      type: integer
      minimum: 0
      description: 全ページ数
      example: 5
