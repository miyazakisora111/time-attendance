ValidationErrorResponse:
  type: object
  description: バリデーションエラー発生時のHTTPレスポンス
  required:
    - message
    - errors
  properties:
    message:
      type: string
      description: バリデーションエラーの総括メッセージ
      example: バリデーションエラー
    errors:
      type: object
      description: フィールド名 → エラーメッセージ配列のマップ
      additionalProperties:
        type: array
        items:
          type: string
      example:
        email:
          - メールアドレスは必須です。
        password:
          - パスワードは8文字以上で入力してください。