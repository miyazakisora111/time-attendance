# --- Reason: path param name を camelCase+Id に統一 ---
PathAttendanceId:
  name: attendanceId
  in: path
  required: true
  description: 勤怠レコードID
  schema:
    type: string
    format: uuid

QueryDateFrom:
  name: from
  in: query
  required: true
  description: 検索期間の開始日
  schema:
    type: string
    format: date

QueryDateTo:
  name: to
  in: query
  required: true
  description: 検索期間の終了日
  schema:
    type: string
    format: date

QueryYear:
  name: year
  in: query
  required: true
  description: 対象年
  schema:
    type: integer
    minimum: 2000
    maximum: 2100

QueryMonth:
  name: month
  in: query
  required: true
  description: 対象月
  schema:
    type: integer
    minimum: 1
    maximum: 12

# --- Reason: ページネーション共通パラメータ追加 ---
QueryPage:
  name: page
  in: query
  required: false
  description: ページ番号（デフォルト1）
  schema:
    type: integer
    minimum: 1
    default: 1

QueryPerPage:
  name: perPage
  in: query
  required: false
  description: 1ページあたりの件数（デフォルト20）
  schema:
    type: integer
    minimum: 1
    maximum: 100
    default: 20

# --- Reason: path param name を camelCase+Id に統一 ---
PathPaidLeaveRequestId:
  name: paidLeaveRequestId
  in: path
  required: true
  description: 有給休暇申請ID
  schema:
    type: string
    format: uuid

PathOvertimeRequestId:
  name: overtimeRequestId
  in: path
  required: true
  description: 残業申請ID
  schema:
    type: string
    format: uuid
