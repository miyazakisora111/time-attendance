openapi: 3.0.3

info:
  title: TimeAttendance API
  version: 1.0.0
  description: 勤怠管理API
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: "{scheme}://{host}/api"
    description: API Server
    variables:
      scheme:
        default: http
        enum: [http, https]
      host:
        default: localhost:8000
        enum:
          - localhost:8000
          - api.example.com

tags:
  - name: Approval
    description: 申請・承認API
  - name: Attendance
    description: 勤怠に関するAPI
  - name: Auth
    description: 認証管理API
  - name: Dashboard
    description: ダッシュボードAPI
  - name: Schedule
    description: スケジュールAPI
  - name: Team
    description: チームAPI
  - name: Settings
    description: 設定API

paths:
  /login:
    $ref: "./paths/auth.yaml#/login"
  /logout:
    $ref: "./paths/auth.yaml#/logout"
  /authme:
    $ref: "./paths/auth.yaml#/authMe"
  /attendances/attendance:
    $ref: "./paths/attendance.yaml#/attendance"
  /attendances/clock-in:
    $ref: "./paths/attendance.yaml#/clockIn"
  /attendances/clock-out:
    $ref: "./paths/attendance.yaml#/clockOut"
  /attendances:
    $ref: "./paths/attendance.yaml#/attendances"
  /attendances/{attendance}:
    $ref: "./paths/attendance.yaml#/attendanceUpdate"
  /dashboard:
    $ref: "./paths/dashboard.yaml#/dashboard"
  /dashboard/clock:
    $ref: "./paths/dashboard.yaml#/dashboardClock"
  /auth/calendar:
    $ref: "./paths/schedule.yaml#/calendar"
  /team/members:
    $ref: "./paths/team.yaml#/teamMembers"
  /settings:
    $ref: "./paths/settings.yaml#/settings"
  /settings/password:
    $ref: "./paths/settings.yaml#/changePassword"
  /settings/login-histories:
    $ref: "./paths/settings.yaml#/loginHistories"
  /approval:
    $ref: "./paths/approval.yaml#/approvalList"
  /approval/paid-leaves:
    $ref: "./paths/approval.yaml#/paidLeaveRequests"
  /approval/paid-leaves/{paidLeaveRequest}/approve:
    $ref: "./paths/approval.yaml#/paidLeaveApprove"
  /approval/paid-leaves/{paidLeaveRequest}/reject:
    $ref: "./paths/approval.yaml#/paidLeaveReject"
  /approval/paid-leaves/{paidLeaveRequest}/cancel:
    $ref: "./paths/approval.yaml#/paidLeaveCancel"
  /approval/overtime-requests:
    $ref: "./paths/approval.yaml#/overtimeRequests"
  /approval/overtime-requests/{overtimeRequest}/approve:
    $ref: "./paths/approval.yaml#/overtimeApprove"
  /approval/overtime-requests/{overtimeRequest}/return:
    $ref: "./paths/approval.yaml#/overtimeReturn"
  /approval/overtime-requests/{overtimeRequest}/cancel:
    $ref: "./paths/approval.yaml#/overtimeCancel"

components:
  schemas:
    # --- Enums ---
    ClockAction:
      $ref: "./components/enums/ClockAction.yaml#/ClockAction"
    ClockStatus:
      $ref: "./components/enums/ClockStatus.yaml#/ClockStatus"
    ThemeType:
      $ref: "./components/enums/ThemeType.yaml#/ThemeType"
    LanguageCode:
      $ref: "./components/enums/LanguageCode.yaml#/LanguageCode"
    CalendarDayStatus:
      $ref: "./components/enums/CalendarDayStatus.yaml#/CalendarDayStatus"
    TeamMemberStatus:
      $ref: "./components/enums/TeamMemberStatus.yaml#/TeamMemberStatus"
    AttendanceStatus:
      $ref: "./components/enums/AttendanceStatus.yaml#/AttendanceStatus"
    UserStatus:
      $ref: "./components/enums/UserStatus.yaml#/UserStatus"
    ApprovalStatus:
      $ref: "./components/enums/ApprovalStatus.yaml#/ApprovalStatus"
    OvertimeRequestStatus:
      $ref: "./components/enums/OvertimeRequestStatus.yaml#/OvertimeRequestStatus"

    # --- Auth ---
    LoginRequest:
      $ref: "./components/schemas/auth/LoginRequest.yaml#/LoginRequest"
    LoginResponse:
      $ref: "./components/schemas/auth/LoginResponse.yaml#/LoginResponse"
    LogoutResponse:
      $ref: "./components/schemas/auth/LogoutResponse.yaml#/LogoutResponse"
    UserResponse:
      $ref: "./components/schemas/auth/UserResponse.yaml#/UserResponse"

    # --- Attendance ---
    AttendanceClockInRequest:
      $ref: "./components/schemas/attendance/AttendanceClockInRequest.yaml#/AttendanceClockInRequest"
    AttendanceClockOutRequest:
      $ref: "./components/schemas/attendance/AttendanceClockOutRequest.yaml#/AttendanceClockOutRequest"
    AttendanceStoreRequest:
      $ref: "./components/schemas/attendance/AttendanceStoreRequest.yaml#/AttendanceStoreRequest"
    AttendanceUpdateRequest:
      $ref: "./components/schemas/attendance/AttendanceUpdateRequest.yaml#/AttendanceUpdateRequest"
    AttendanceResponse:
      $ref: "./components/schemas/attendance/AttendanceResponse.yaml#/AttendanceResponse"
    AttendanceIndexRequest:
      $ref: "./components/schemas/attendance/AttendanceIndexRequest.yaml#/AttendanceIndexRequest"

    # --- Dashboard ---
    DashboardClockRequest:
      $ref: "./components/schemas/dashboard/DashboardClockRequest.yaml#/DashboardClockRequest"
    DashboardResponse:
      $ref: "./components/schemas/dashboard/DashboardResponse.yaml#/DashboardResponse"
    DashboardUser:
      $ref: "./components/schemas/dashboard/DashboardUser.yaml#/DashboardUser"
    DashboardTodayRecord:
      $ref: "./components/schemas/dashboard/DashboardTodayRecord.yaml#/DashboardTodayRecord"
    DashboardStats:
      $ref: "./components/schemas/dashboard/DashboardStats.yaml#/DashboardStats"
    DashboardRecentRecord:
      $ref: "./components/schemas/dashboard/DashboardRecentRecord.yaml#/DashboardRecentRecord"

    # --- Schedule ---
    CalendarIndexRequest:
      $ref: "./components/schemas/schedule/CalendarIndexRequest.yaml#/CalendarIndexRequest"
    CalendarResponse:
      $ref: "./components/schemas/schedule/CalendarResponse.yaml#/CalendarResponse"
    CalendarSummary:
      $ref: "./components/schemas/schedule/CalendarSummary.yaml#/CalendarSummary"
    CalendarDay:
      $ref: "./components/schemas/schedule/CalendarDay.yaml#/CalendarDay"

    # --- Settings ---
    SettingsResponse:
      $ref: "./components/schemas/settings/SettingsResponse.yaml#/SettingsResponse"
    UpdateSettingsRequest:
      $ref: "./components/schemas/settings/UpdateSettingsRequest.yaml#/UpdateSettingsRequest"
    SettingsProfile:
      $ref: "./components/schemas/settings/SettingsProfile.yaml#/SettingsProfile"
    UpdateSettingsProfile:
      $ref: "./components/schemas/settings/UpdateSettingsProfile.yaml#/UpdateSettingsProfile"
    ChangePasswordRequest:
      $ref: "./components/schemas/settings/ChangePasswordRequest.yaml#/ChangePasswordRequest"
    LoginHistoryResponse:
      $ref: "./components/schemas/settings/LoginHistoryResponse.yaml#/LoginHistoryResponse"
    SettingsNotifications:
      $ref: "./components/schemas/settings/SettingsNotifications.yaml#/SettingsNotifications"
    SettingsSecurity:
      $ref: "./components/schemas/settings/SettingsSecurity.yaml#/SettingsSecurity"

    # --- Team ---
    TeamMembersResponse:
      $ref: "./components/schemas/team/TeamMembersResponse.yaml#/TeamMembersResponse"
    TeamMember:
      $ref: "./components/schemas/team/TeamMember.yaml#/TeamMember"

    # --- Approval ---
    ApprovalListResponse:
      $ref: "./components/schemas/approval/ApprovalListResponse.yaml#/ApprovalListResponse"
    PaidLeaveRequestResponse:
      $ref: "./components/schemas/approval/PaidLeaveRequestResponse.yaml#/PaidLeaveRequestResponse"
    CreatePaidLeaveRequest:
      $ref: "./components/schemas/approval/CreatePaidLeaveRequest.yaml#/CreatePaidLeaveRequest"
    OvertimeRequestResponse:
      $ref: "./components/schemas/approval/OvertimeRequestResponse.yaml#/OvertimeRequestResponse"
    CreateOvertimeRequest:
      $ref: "./components/schemas/approval/CreateOvertimeRequest.yaml#/CreateOvertimeRequest"
    PaidLeaveSummary:
      $ref: "./components/schemas/approval/PaidLeaveSummary.yaml#/PaidLeaveSummary"

    # --- Error ---
    ErrorResponse:
      $ref: "./components/schemas/common/ErrorResponse.yaml#/ErrorResponse"
    ValidationErrorResponse:
      $ref: "./components/schemas/common/ValidationErrorResponse.yaml#/ValidationErrorResponse"

  parameters:
    $ref: "./components/parameters.yaml"

  requestBodies:
    $ref: "./components/requestBodies.yaml"

  responses:
    $ref: "./components/responses.yaml"

  securitySchemes:
    $ref: "./components/securitySchemes.yaml"

security:
  - BearerAuth: []
