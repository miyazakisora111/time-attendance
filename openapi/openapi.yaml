openapi: 3.0.3
info:
  title: TimeAttendance API
  version: 1.1.0
  description: |
    勤怠管理システムの REST API 定義。
    従業員の出退勤・休憩管理、
    ダッシュボード集計、カレンダー、ユーザー設定を提供する。

    ## 認証
    JWT Bearer トークンを `Authorization: Bearer <token>` ヘッダーで送信する。
    `/login` のみ認証不要。それ以外は全て認証必須。

    ## エラーハンドリング
    - 401: トークン無効または期限切れ
    - 403: 権限不足
    - 404: 指定リソースが存在しない
    - 409: 状態の競合（二重打刻など）
    - 422: バリデーションエラー（フィールド別メッセージ付き）
    - 500: 予期しないサーバーエラー
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: "{scheme}://{host}/api"
    description: API Server
    variables:
      scheme:
        default: http
        enum: [http, https]
      host:
        default: localhost:8000
        enum:
          - localhost:8000
          - api.example.com

tags:
  - name: Auth
    description: |
      認証・セッション管理。
      ログイン時に JWT を発行し、ログアウト時に無効化する。
      `/login` のみ認証不要。
  - name: Dashboard
    description: |
      ダッシュボード集計。
      当月の勤怠統計・今日の勤怠・直近の勤怠記録をまとめて返す。
      打刻アクション（出勤・退勤・休憩開始・休憩終了）もここから実行可能。
  - name: Attendance
    description: |
      勤怠の CRUD と打刻操作。
      出退勤・休憩の打刻、勤怠レコードの一覧取得・新規作成・更新を行う。
  - name: Schedule
    description: |
      勤務スケジュール・カレンダー。
      指定年月のカレンダー（日毎の勤務状態・シフト情報・サマリー）を返す。
  - name: Team
    description: |
      チームメンバー管理。
      ログインユーザーが所属するチームのメンバー一覧と現在の勤務状態を返す。
  - name: Settings
    description: |
      ユーザー設定。
      プロフィール・通知・テーマ・言語設定の取得と更新、パスワード変更、ログイン履歴を提供する。

paths:
  /login:
    $ref: "./paths/auth.yaml#/login"
  /logout:
    $ref: "./paths/auth.yaml#/logout"
  /auth/me:
    $ref: "./paths/auth.yaml#/authMe"
  /attendances/today:
    $ref: "./paths/attendance.yaml#/todayAttendance"
  /attendances/clock-in:
    $ref: "./paths/attendance.yaml#/clockIn"
  /attendances/clock-out:
    $ref: "./paths/attendance.yaml#/clockOut"
  /attendances:
    $ref: "./paths/attendance.yaml#/attendances"
  /attendances/{attendanceId}:
    $ref: "./paths/attendance.yaml#/attendanceUpdate"
  /dashboard:
    $ref: "./paths/dashboard.yaml#/dashboard"
  /dashboard/clock:
    $ref: "./paths/dashboard.yaml#/dashboardClock"
  /schedule/calendar:
    $ref: "./paths/schedule.yaml#/calendar"
  /team/members:
    $ref: "./paths/team.yaml#/teamMembers"
  /settings:
    $ref: "./paths/settings.yaml#/settings"
  /settings/password:
    $ref: "./paths/settings.yaml#/changePassword"
  /settings/login-histories:
    $ref: "./paths/settings.yaml#/loginHistories"

