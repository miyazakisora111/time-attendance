openapi: 3.0.3

info:
  title: Attendance API
  version: 1.0.0
  description: 勤怠管理API（JWT認証）

servers:
  - url: http://localhost/api/v1
  - url: https://api.example.com/api/v1

tags:
  - name: Attendance

paths:
  /attendances/today:
    $ref: "./paths/attendances.yaml#/today"
  /attendances/clock-in:
    $ref: "./paths/attendances.yaml#/clockIn"
  /attendances/clock-out:
    $ref: "./paths/attendances.yaml#/clockOut"

components:
  schemas:
    Attendance:
      $ref: "./components/schemas/attendance.yaml#/Attendance"
    ErrorResponse:
      $ref: "./components/schemas/error.yaml#/ErrorResponse"
    ValidationErrorResponse:
      $ref: "./components/schemas/error.yaml#/ValidationErrorResponse"

  responses:
    Unauthorized:
      $ref: "./components/responses/common.yaml#/Unauthorized"
    Forbidden:
      $ref: "./components/responses/common.yaml#/Forbidden"
    ValidationError:
      $ref: "./components/responses/common.yaml#/ValidationError"
    Conflict:
      $ref: "./components/responses/common.yaml#/Conflict"
    ServerError:
      $ref: "./components/responses/common.yaml#/ServerError"

  securitySchemes:
    BearerAuth:
      $ref: "./components/security.yaml#/BearerAuth"

security:
  - BearerAuth: []
