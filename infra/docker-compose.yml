name: ${COMPOSE_PROJECT_NAME:-time-attendance}

services:
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/app.conf:/etc/nginx/conf.d/app.conf:ro
      - ./nginx/conf.d/api.conf:/etc/nginx/conf.d/api.conf:ro
      - ../back/public:/var/www/html/public:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - appnet
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: infra/php/Dockerfile
      target: ${APP_BUILD_TARGET:-prod}
    env_file:
      - ../back/.env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-time_attendance}
      DB_USERNAME: ${POSTGRES_USER:-time_attendance}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: null
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - appnet
    restart: unless-stopped

  front:
    build:
      context: ..
      dockerfile: infra/node/Dockerfile
      target: ${FRONT_BUILD_TARGET:-prod}
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    networks:
      - appnet
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-time_attendance}
      POSTGRES_USER: ${POSTGRES_USER:-time_attendance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-time_attendance} -d ${POSTGRES_DB:-time_attendance}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appnet
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appnet
    restart: unless-stopped

networks:
  appnet:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
