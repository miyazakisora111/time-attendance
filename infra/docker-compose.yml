name: ${COMPOSE_PROJECT_NAME:-time-attendance}

services:
  app:
    build:
      context: ../back
      dockerfile: Dockerfile
      target: ${APP_BUILD_TARGET:-prod}
    env_file:
      - ../back/.env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-time_attendance}
      DB_USERNAME: ${POSTGRES_USER:-time_attendance}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: null
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - appnet

  web:
    build:
      context: ../front
      dockerfile: Dockerfile
      target: ${WEB_BUILD_TARGET:-prod}
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    depends_on:
      app:
        condition: service_started
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../back/public:/var/www/html/public:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - appnet

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-time_attendance}
      POSTGRES_USER: ${POSTGRES_USER:-time_attendance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-time_attendance}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-time_attendance} -d ${POSTGRES_DB:-time_attendance}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appnet

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
