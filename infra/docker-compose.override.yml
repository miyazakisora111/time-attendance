services:
  nginx:
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx/conf.d/app.dev.conf:/etc/nginx/conf.d/app.conf:ro

  app:
    build:
      target: dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../back:/var/www/html
      - ./php/xdebug.ini:/usr/local/etc/php/conf.d/99-xdebug.ini:ro
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost
      FRONTEND_URL: http://localhost

  front:
    build:
      target: dev
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    volumes:
      - ../front:/app
      - front_node_modules:/app/node_modules

  db:
    ports:
      - "${DB_PORT:-5432}:5432"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

volumes:
  front_node_modules:
