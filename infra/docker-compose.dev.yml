services:
  app:
    build:
      target: dev
    env_file:
      - ../back/.env
    volumes:
      - ../back:/var/www/html
      - ../back/docker/xdebug.ini:/usr/local/etc/php/conf.d/99-xdebug.ini:ro
    environment:
      APP_ENV: local
      APP_DEBUG: "true"

  web:
    build:
      target: prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    ports:
      - "${APP_PORT:-8000}:80"

  front:
    build:
      context: ../front
      dockerfile: Dockerfile
      target: dev
    env_file:
      - ../front/.env
    command: sh -c "if [ ! -d node_modules ] || [ -z \"$$(ls -A node_modules 2>/dev/null)\" ]; then pnpm install --no-frozen-lockfile; fi && pnpm dev --host --port 5173 --strictPort"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      VITE_DEV_PROXY_TARGET: ${VITE_DEV_PROXY_TARGET:-http://web}
      VITE_HMR_HOST: ${VITE_HMR_HOST:-localhost}
      VITE_HMR_CLIENT_PORT: ${VITE_HMR_CLIENT_PORT:-5173}
    volumes:
      - ../front:/app
      - front_node_modules:/app/node_modules
    ports:
      - "${FRONT_PORT:-5173}:5173"
    depends_on:
      web:
        condition: service_started
    networks:
      - appnet

  postgres:
    ports:
      - "${DB_PORT:-5432}:5432"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

volumes:
  front_node_modules:
    driver: local
