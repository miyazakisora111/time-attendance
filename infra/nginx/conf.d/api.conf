# ============================================================
# /api — Laravel (PHP-FPM) location blocks
# Included inside the server block defined in app.conf
# ============================================================

location ^~ /api {
    root /var/www/html/public;
    try_files $uri $uri/ @api_fallback;

    location ~ \.php$ {
        include        fastcgi_params;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param  DOCUMENT_ROOT   /var/www/html/public;
        fastcgi_param  PATH_INFO       $fastcgi_path_info;
        fastcgi_pass   php-fpm;
        fastcgi_read_timeout  120s;
        fastcgi_buffers       16 16k;
        fastcgi_buffer_size   32k;
    }
}

# Named location: /api 内の try_files フォールバック先
# /index.php だと location ^~ /api のスコープ外に出てしまうため、
# named location で直接 PHP-FPM に転送する
location @api_fallback {
    include        fastcgi_params;
    fastcgi_index  index.php;
    fastcgi_param  SCRIPT_FILENAME /var/www/html/public/index.php;
    fastcgi_param  DOCUMENT_ROOT   /var/www/html/public;
    fastcgi_param  SCRIPT_NAME     /index.php;
    fastcgi_param  REQUEST_URI     $request_uri;
    fastcgi_pass   php-fpm;
    fastcgi_read_timeout  120s;
    fastcgi_buffers       16 16k;
    fastcgi_buffer_size   32k;
}
