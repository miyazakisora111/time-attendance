services:
  nginx:
    ports:
      - "${APP_PORT:-80}:80"
    restart: always
    stop_grace_period: 10s
    mem_limit: 256m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      target: prod
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    restart: always
    stop_grace_period: 30s
    mem_limit: 512m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  front:
    build:
      target: prod
    restart: always
    stop_grace_period: 10s
    mem_limit: 128m
    cpus: 0.25
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    restart: always
    stop_grace_period: 30s
    mem_limit: 1g
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    restart: always
    stop_grace_period: 30s
    mem_limit: 256m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
